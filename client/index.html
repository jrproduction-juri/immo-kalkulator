    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Wie berechne ich die Bruttomietrendite einer Immobilie?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Die Bruttomietrendite berechnet sich als: (Jahreskaltmiete / Kaufpreis) × 100. Beispiel: Bei einer Kaltmiete von 1.000 €/Monat und einem Kaufpreis von 300.000 € ergibt sich eine Bruttomietrendite von 4 %."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist ein guter Netto-Cashflow bei einer Immobilie?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ein positiver Netto-Cashflow bedeutet, dass die Mieteinnahmen alle Kosten (Kreditrate, Hausgeld, Verwaltung) übersteigen. Für Investoren gilt ein monatlicher Überschuss von 100–300 € als solide Basis."
          }
        },
        {
          "@type": "Question",
          "name": "Was bedeutet AfA bei Immobilien?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AfA steht für Absetzung für Abnutzung. Bei vermieteten Immobilien können Gebäudekosten steuerlich abgeschrieben werden: 2 % p.a. bei Baujahr vor 1925, 2,5 % bei älteren Gebäuden, 3 % bei Neubauten ab 2023."
          }
        },
        {
          "@type": "Question",
          "name": "Welche Immobilienarten kann ich mit dem ImmoRenditeTool analysieren?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Das ImmoRenditeTool unterstützt Eigentumswohnungen (ETW), Einfamilienhäuser (EFH), Mehrfamilienhäuser (MFH), Neubauten und Gewerbeimmobilien – jeweils mit spezifischen Berechnungsfeldern."
          }
        },
        {
          "@type": "Question",
          "name": "Wie hoch sollte die Eigenkapitalrendite bei einer Immobilie sein?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Eine Eigenkapitalrendite von 5–10 % gilt als attraktiv für Immobilien-Investments in Deutschland. Sie berechnet sich aus dem jährlichen Cashflow nach Steuern geteilt durch das eingesetzte Eigenkapital."
          }
        },
        {
          "@type": "Question",
          "name": "Kann ich Immobilien nach 24 Monaten steuerfrei verkaufen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, bei selbstgenutzten Eigentumswohnungen entfällt die Spekulationssteuer nach 24 Monaten Eigennutzung. Das ImmoRenditeTool berechnet dieses Szenario automatisch."
          }
        },
        {
          "@type": "Question",
          "name": "Ist das ImmoRenditeTool kostenlos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, die Grundfunktionen sind kostenlos nutzbar. Premium-Funktionen wie erweiterte Szenarien, PDF-Reports und Portfolio-Verwaltung sind ab 9 €/Monat verfügbar."
          }
        },
        {
          "@type": "Question",
          "name": "Wie berechne ich den maximalen Kaufpreis für eine Zielrendite?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Der maximale Kaufpreis für eine Zielrendite ergibt sich aus: Jahreskaltmiete / (Zielrendite / 100). Bei 1.200 €/Monat Kaltmiete und 6 % Zielrendite wäre der maximale Kaufpreis 240.000 €."
          }
        }
      ]
    }
    </script>
